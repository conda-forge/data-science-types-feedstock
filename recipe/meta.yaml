{% set name = "data-science-types" %}
{% set version = "0.2.23" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/data-science-types-{{ version }}.tar.gz
  sha256: 8096b9a35a8a187bf9a122b4707c97de841d810744690ee2a4ac30c6462e0d16

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - python >={{ python_min }}

test:
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/data-science-types/
  summary: Type stubs for Python machine learning libraries
  license: Apache-2.0
  license_file: LICENSE
  dev_url: https://github.com/predictive-analytics-lab/data-science-types

extra:
  recipe-maintainers:
    - ickc
